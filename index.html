<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אנציקלופדיית אבני חן</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#92400e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="אבני חן">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root"></div>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="js/data.js"></script>
    <script type="text/babel" src="js/app.js"></script>
    
    <script>
        // רישום Service Worker לעדכונים אוטומטיים
        if ('serviceWorker' in navigator) {
            let refreshing = false;
            
            navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('Service Worker רשום בהצלחה');
                    
                    // בדיקת עדכונים
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // יש עדכון זמין!
                                if (confirm('יש גרסה חדשה של האפליקציה! לעדכן עכשיו?')) {
                                    newWorker.postMessage({ action: 'skipWaiting' });
                                }
                            }
                        });
                    });
                })
                .catch(err => console.log('Service Worker נכשל:', err));
            
            // רענון אוטומטי לאחר עדכון
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }

        // הצעה להוסיף למסך הבית
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // הצג הודעה למשתמש
            setTimeout(() => {
                if (confirm('רוצה להוסיף את אנציקלופדיית אבני חן למסך הבית?')) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        deferredPrompt = null;
                    });
                }
            }, 3000); // אחרי 3 שניות
        });
    </script>
</body>
</html>
